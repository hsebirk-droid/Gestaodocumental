<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birkenstock | Gestão de Documentos e Acessos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DIN Next', 'Arial', sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
        }

        :root {
            --birkenstock-blue: #003d7c;
            --birkenstock-dark-blue: #002a57;
            --birkenstock-green: #4a6a3b;
            --birkenstock-beige: #f4f0e6;
            --birkenstock-gray: #6c6e6f;
        }

        .header {
            background: linear-gradient(135deg, var(--birkenstock-blue), var(--birkenstock-dark-blue));
            color: white;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-placeholder {
            background: white;
            padding: 0.3rem 1rem;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--birkenstock-blue);
        }

        .logo-text h1 {
            font-size: 1.2rem;
        }

        .logo-text p {
            font-size: 0.7rem;
            opacity: 0.9;
        }

        .user-selector {
            display: flex;
            gap: 0.5rem;
            background: rgba(255,255,255,0.15);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
        }

        .user-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .user-btn.active {
            background: var(--birkenstock-green);
        }

        .user-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .app-container {
            display: flex;
            max-width: 1400px;
            margin: 1.5rem auto;
            gap: 1.5rem;
            padding: 0 1.5rem;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            flex-shrink: 0;
            height: fit-content;
            position: sticky;
            top: 85px;
        }

        .sidebar-header {
            background: var(--birkenstock-blue);
            color: white;
            padding: 1rem;
            font-weight: 600;
            border-radius: 12px 12px 0 0;
        }

        .sidebar-nav {
            padding: 0.5rem 0;
        }

        .nav-item {
            padding: 0.7rem 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .nav-item:hover {
            background: var(--birkenstock-beige);
            border-left-color: var(--birkenstock-green);
        }

        .nav-item.active {
            background: var(--birkenstock-beige);
            border-left-color: var(--birkenstock-green);
            color: var(--birkenstock-blue);
            font-weight: 500;
        }

        .nav-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .content-area {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .content-header {
            background: var(--birkenstock-beige);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .content-header h2 {
            font-size: 1.2rem;
            color: var(--birkenstock-blue);
        }

        .content-body {
            padding: 1.5rem;
            max-height: calc(100vh - 150px);
            overflow-y: auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            border: 1px solid #e0e0e0;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--birkenstock-blue);
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--birkenstock-green);
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-input {
            padding: 0.4rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            font-size: 0.8rem;
            color: #555;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--birkenstock-blue);
            color: white;
        }

        .btn-primary:hover {
            background: var(--birkenstock-dark-blue);
        }

        .btn-success {
            background: var(--birkenstock-green);
            color: white;
        }

        .btn-success:hover {
            background: #3a5a2b;
        }

        .btn-warning {
            background: #f4a261;
            color: white;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-sm {
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
        }

        .btn-excel {
            background: #1f724c;
            color: white;
        }

        .btn-excel:hover {
            background: #0e5a3a;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .table th,
        .table td {
            border: 1px solid #e0e0e0;
            padding: 0.6rem;
            text-align: left;
        }

        .table th {
            background: var(--birkenstock-beige);
            color: var(--birkenstock-blue);
            font-weight: 600;
        }

        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge-info {
            background: var(--birkenstock-beige);
            color: var(--birkenstock-blue);
        }

        .alert {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .alert-info {
            background: var(--birkenstock-beige);
            border-left: 4px solid var(--birkenstock-blue);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            border: 1px solid #e0e0e0;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--birkenstock-blue);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--birkenstock-blue);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .search-box {
            position: relative;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .search-results div {
            padding: 0.5rem;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .search-results div:hover {
            background: var(--birkenstock-beige);
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                position: static;
            }

            .sidebar-nav {
                display: flex;
                flex-wrap: wrap;
            }

            .nav-item {
                flex: 1;
                border-left: none;
                border-bottom: 2px solid transparent;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="header-content">
        <div class="logo-container">
            <div class="logo-placeholder">
                <strong>BIRKENSTOCK</strong>
            </div>
            <div class="logo-text">
                <h1>Gestão de Documentos e Acessos</h1>
                <p>S&CC Portugal</p>
            </div>
        </div>

            <button class="user-btn active" data-user="portaria">🚪 Portaria</button>
            <button class="user-btn" data-user="admin">👑 Administrador</button>
        </div>

</div>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">📋 MENU</div>
        <div class="sidebar-nav">
            <div class="nav-item active" data-page="dashboard">🏠 Dashboard</div>
            <div class="nav-item" data-page="acessos">🚪 Controlo de Acessos</div>
            <div class="nav-item" data-page="prestadores" id="menuPrestadores">🏢 Prestadores</div>

<script>
    // DADOS COMPLETOS
    let currentUser = 'portaria';
    let currentPage = 'dashboard';
    
    // Prestadores com trabalhadores associados
    let prestadores = [
        { id: 1, nome: "Manutenção Industrial Lda", nif: "513952608", email: "contato@manutencao.pt", status: "autorizado", 
          documentos: { seguranca: "valido", alvara: "valido", formacao: "valido" },
          trabalhadores: ["João Silva", "Carlos Mendes", "António Ferreira"] },
        { id: 2, nome: "Transportes Expresso", nif: "509059040", email: "logistica@expresso.pt", status: "pendente", 
          documentos: { seguranca: "pendente", alvara: "valido", formacao: "pendente" },
          trabalhadores: ["José Santos", "Paulo Rodrigues"] },
        { id: 3, nome: "Limpeza e Conservação Lda", nif: "506323781", email: "limpeza@conservacao.pt", status: "autorizado", 
          documentos: { seguranca: "valido", alvara: "valido", formacao: "valido" },
          trabalhadores: ["Maria Silva", "Ana Costa", "Sofia Martins"] },
        { id: 4, nome: "Segurança Global", nif: "512345678", email: "seguranca@global.pt", status: "pendente", 
          documentos: { seguranca: "pendente", alvara: "pendente", formacao: "pendente" },
          trabalhadores: ["Rui Pereira", "Pedro Alves"] }
    ];
    
    // Pessoas no interior
    let pessoasNoInterior = [
        { id: 1, nome: "João Silva", empresaId: 1, empresaNome: "Manutenção Industrial Lda", tipo: "prestador", entrada: "08:30", data: new Date().toLocaleDateString('pt-PT'), timestamp: new Date().setHours(8,30,0) },
        { id: 2, nome: "Maria Silva", empresaId: 3, empresaNome: "Limpeza e Conservação Lda", tipo: "prestador", entrada: "09:15", data: new Date().toLocaleDateString('pt-PT'), timestamp: new Date().setHours(9,15,0) },
        { id: 3, nome: "Carlos Oliveira", empresaId: null, empresaNome: "-", tipo: "visita", entrada: "10:00", data: new Date().toLocaleDateString('pt-PT'), timestamp: new Date().setHours(10,0,0) }
    ];
    
    // Histórico
    let historicoAcessos = [
        { id: 1, nome: "João Silva", empresaNome: "Manutenção Industrial Lda", tipo: "prestador", acao: "entrada", data: new Date().toLocaleDateString('pt-PT'), hora: "08:30", timestamp: new Date().setHours(8,30,0) },
        { id: 2, nome: "Maria Silva", empresaNome: "Limpeza e Conservação Lda", tipo: "prestador", acao: "entrada", data: new Date().toLocaleDateString('pt-PT'), hora: "09:15", timestamp: new Date().setHours(9,15,0) },
        { id: 3, nome: "Carlos Oliveira", empresaNome: "-", tipo: "visita", acao: "entrada", data: new Date().toLocaleDateString('pt-PT'), hora: "10:00", timestamp: new Date().setHours(10,0,0) },
        { id: 4, nome: "João Silva", empresaNome: "Manutenção Industrial Lda", tipo: "prestador", acao: "saida", data: "26/03/2026", hora: "17:30", timestamp: new Date(2026, 2, 26, 17, 30).getTime() },
        { id: 5, nome: "António Ferreira", empresaNome: "Manutenção Industrial Lda", tipo: "prestador", acao: "entrada", data: "26/03/2026", hora: "08:45", timestamp: new Date(2026, 2, 26, 8, 45).getTime() }
    ];
    
    let nextId = 100;
    let currentPrestadorSelecionado = null;
    let historicoFiltradoAtual = [];
    let prestadoresFiltradosAtual = [];
    let documentosFiltradosAtual = [];
    let interiorFiltradoAtual = [];
    
    // Função para exportar para Excel (CSV)
    function exportToExcel(data, filename, columns) {
        if (!data || data.length === 0) {
            showToast('Nenhum dado para exportar', 'warning');
            return;
        }
        let csvRows = [];
        csvRows.push(columns.map(c => `"${c}"`).join(','));
        
        data.forEach(row => {
            const values = columns.map(col => {
                let val = row[col] !== undefined && row[col] !== null ? row[col] : '';
                if (typeof val === 'string') val = val.replace(/"/g, '""');
                return `"${val}"`;
            });
            csvRows.push(values.join(','));
        });
        
        const blob = new Blob(["\uFEFF" + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', `${filename}_${new Date().toLocaleDateString('pt-PT').replace(/\//g, '-')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToast(`📊 Exportado: ${filename}`, 'success');
    }
    
    function showToast(msg, type = 'info') {
        let toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.style.background = type === 'success' ? '#4a6a3b' : type === 'warning' ? '#f4a261' : '#003d7c';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }
    
    function showModal(content) {
        let modal = document.getElementById('modal');
        let mc = document.getElementById('modal-content');
        mc.innerHTML = content + '<div style="margin-top:1rem; text-align:right;"><button class="btn btn-secondary" onclick="closeModal()">Fechar</button></div>';
        modal.style.display = 'flex';
    }
    
    function verificarAutorizacao(prestador) {
        let ok = prestador.documentos.seguranca === 'valido' && prestador.documentos.alvara === 'valido' && prestador.documentos.formacao === 'valido';
        if (ok && prestador.status !== 'autorizado') {
            prestador.status = 'autorizado';
            showToast('✅ ' + prestador.nome + ' AUTORIZADO!', 'success');
        } else if (!ok && prestador.status === 'autorizado') {
            prestador.status = 'pendente';
            showToast('⚠️ ' + prestador.nome + ' perdeu autorização', 'warning');
        }
        return ok;
    }
    
    function registrarEntrada(tipo, prestadorId, nomePessoa, transportadoraNome) {
        if (tipo === 'prestador') {
            let prestador = prestadores.find(p => p.id === prestadorId);
            if (!prestador) return false;
            if (prestador.status !== 'autorizado') {
                showToast('❌ ACESSO NEGADO! ' + prestador.nome + ' não autorizado.', 'warning');
                return false;
            }
            let now = new Date();
            let pessoa = {
                id: nextId++, nome: nomePessoa, empresaId: prestadorId, empresaNome: prestador.nome, tipo: "prestador",
                entrada: now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }),
                data: now.toLocaleDateString('pt-PT'), timestamp: now.getTime()
            };
            pessoasNoInterior.push(pessoa);
            historicoAcessos.unshift({
                id: nextId++, nome: nomePessoa, empresaNome: prestador.nome, tipo: "prestador", acao: "entrada",
                data: pessoa.data, hora: pessoa.entrada, timestamp: now.getTime()
            });
            showToast('✅ Entrada: ' + nomePessoa + ' (' + prestador.nome + ')', 'success');
        } else if (tipo === 'visita') {
            let now = new Date();
            let pessoa = {
                id: nextId++, nome: nomePessoa, empresaId: null, empresaNome: "-", tipo: "visita",
                entrada: now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }),
                data: now.toLocaleDateString('pt-PT'), timestamp: now.getTime()
            };
            pessoasNoInterior.push(pessoa);
            historicoAcessos.unshift({
                id: nextId++, nome: nomePessoa, empresaNome: "-", tipo: "visita", acao: "entrada",
                data: pessoa.data, hora: pessoa.entrada, timestamp: now.getTime()
            });
            showToast('✅ Visita: ' + nomePessoa, 'success');
        } else if (tipo === 'transportista') {
            let now = new Date();
            let pessoa = {
                id: nextId++, nome: nomePessoa, empresaId: null, empresaNome: transportadoraNome || "Transportadora", tipo: "transportista",
                entrada: now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }),
                data: now.toLocaleDateString('pt-PT'), timestamp: now.getTime()
            };
            pessoasNoInterior.push(pessoa);
            historicoAcessos.unshift({
                id: nextId++, nome: nomePessoa, empresaNome: transportadoraNome || "Transportadora", tipo: "transportista", acao: "entrada",
                data: pessoa.data, hora: pessoa.entrada, timestamp: now.getTime()
            });
            showToast('✅ Transportista: ' + nomePessoa, 'success');
        }
        return true;
    }
    
    function registrarSaida(pessoaId) {
        let pessoa = pessoasNoInterior.find(p => p.id === pessoaId);
        if (!pessoa) return;
        let now = new Date();
        historicoAcessos.unshift({
            id: nextId++, nome: pessoa.nome, empresaNome: pessoa.empresaNome, tipo: pessoa.tipo, acao: "saida",
            data: now.toLocaleDateString('pt-PT'),
            hora: now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }),
            timestamp: now.getTime()
        });
        pessoasNoInterior = pessoasNoInterior.filter(p => p.id !== pessoaId);
        showToast('🚪 Saída: ' + pessoa.nome, 'success');
        renderPage(currentPage);
    }
    
    // FUNÇÕES DE PESQUISA
    window.filterPrestadores = function() {
        let search = document.getElementById('prestadorSearch')?.value?.toLowerCase() || '';
        let results = prestadores.filter(p => p.nome.toLowerCase().includes(search));
        let div = document.getElementById('prestadorResults');
        if (search && results.length) {
            div.innerHTML = results.map(p => '<div onclick="selectPrestador(' + p.id + ', \'' + p.nome.replace(/'/g, "\\'") + '\')">' + p.nome + ' - ' + (p.status === 'autorizado' ? '✅ Autorizado' : '⏳ Pendente') + '</div>').join('');
            div.style.display = 'block';
        } else {
            div.style.display = 'none';
        }
    };
    
    window.selectPrestador = function(id, nome) {
        document.getElementById('prestadorSearch').value = nome;
        currentPrestadorSelecionado = prestadores.find(p => p.id === id);
        let prestador = currentPrestadorSelecionado;
        document.getElementById('selectedPrestadorId').value = id;
        document.getElementById('selectedPrestadorInfo').innerHTML = '<strong>' + prestador.nome + '</strong><br>Status: ' + (prestador.status === 'autorizado' ? '✅ AUTORIZADO' : '⏳ PENDENTE') + '<br>Trabalhadores disponíveis: ' + prestador.trabalhadores.join(', ');
        document.getElementById('prestadorResults').style.display = 'none';
        document.getElementById('trabalhadorSearch').disabled = false;
        document.getElementById('trabalhadorSearch').value = '';
        document.getElementById('selectedTrabalhador').value = '';
        filterTrabalhadores();
    };
    
    window.filterTrabalhadores = function() {
        let prestador = currentPrestadorSelecionado;
        if (!prestador) return;
        let search = document.getElementById('trabalhadorSearch')?.value?.toLowerCase() || '';
        let results = prestador.trabalhadores.filter(t => t.toLowerCase().includes(search));
        let div = document.getElementById('trabalhadorResults');
        if (search && results.length) {
            div.innerHTML = results.map(t => '<div onclick="selectTrabalhador(\'' + t.replace(/'/g, "\\'") + '\')">' + t + '</div>').join('');
            div.style.display = 'block';
        } else {
            div.style.display = 'none';
        }
    };
    
    window.selectTrabalhador = function(nome) {
        document.getElementById('trabalhadorSearch').value = nome;
        document.getElementById('selectedTrabalhador').value = nome;
        document.getElementById('trabalhadorResults').style.display = 'none';
    };
    
    window.toggleAcessoFields = function() {
        let tipo = document.getElementById('acessoTipo').value;
        document.getElementById('prestadorSection').style.display = tipo === 'prestador' ? 'block' : 'none';
        document.getElementById('visitaSection').style.display = tipo === 'visita' ? 'block' : 'none';
        document.getElementById('transportistaSection').style.display = tipo === 'transportista' ? 'block' : 'none';
    };
    
    window.confirmarEntrada = function() {
        let tipo = document.getElementById('acessoTipo').value;
        if (tipo === 'prestador') {
            let prestadorId = document.getElementById('selectedPrestadorId').value;
            let trabalhador = document.getElementById('selectedTrabalhador').value;
            if (!prestadorId || !trabalhador) {
                showToast('Selecione prestador e trabalhador', 'warning');
                return;
            }
            registrarEntrada('prestador', parseInt(prestadorId), trabalhador, '');
        } else if (tipo === 'visita') {
            let nome = document.getElementById('visitaNome')?.value;
            if (!nome) {
                showToast('Informe nome da visita', 'warning');
                return;
            }
            registrarEntrada('visita', null, nome, '');
        } else if (tipo === 'transportista') {
            let motorista = document.getElementById('motoristaNome')?.value;
            let transportadora = document.getElementById('transportadoraNome')?.value;
            if (!motorista) {
                showToast('Informe nome do motorista', 'warning');
                return;
            }
            registrarEntrada('transportista', null, motorista, transportadora);
        }
        renderPage(currentPage);
    };

    function atualizarHistoricoLista() {
        let inicio = document.getElementById('filtroDataInicio')?.value;
        let fim = document.getElementById('filtroDataFim')?.value;
        let tipo = document.getElementById('filtroTipo')?.value;
        let acao = document.getElementById('filtroAcao')?.value;
        let nome = document.getElementById('filtroNome')?.value?.toLowerCase();
        
        let filtrados = [...historicoAcessos].sort((a, b) => b.timestamp - a.timestamp);
        if (inicio) filtrados = filtrados.filter(h => h.data >= inicio);
        if (fim) filtrados = filtrados.filter(h => h.data <= fim);
        if (tipo) filtrados = filtrados.filter(h => h.tipo === tipo);
        if (acao) filtrados = filtrados.filter(h => h.acao === acao);
        if (nome) filtrados = filtrados.filter(h => h.nome.toLowerCase().includes(nome) || h.empresaNome.toLowerCase().includes(nome));
        
        historicoFiltradoAtual = filtrados;
        
        let html = '<table class="table"><thead><th>Data</th><th>Hora</th><th>Nome</th><th>Empresa</th><th>Tipo</th><th>Ação</th><th>Ordem</th></thead><tbody>';
        filtrados.forEach((h, idx) => {
            html += '<tr><td>' + h.data + '</td><td>' + h.hora + '</td><td>' + h.nome + '</td><td>' + h.empresaNome + '</td>';
            html += '<td><span class="badge ' + (h.tipo === 'prestador' ? 'badge-success' : h.tipo === 'visita' ? 'badge-info' : 'badge-warning') + '">' + (h.tipo === 'prestador' ? 'Prestador' : h.tipo === 'visita' ? 'Visita' : 'Transportista') + '</span></td>';
            html += '<td><span class="badge ' + (h.acao === 'entrada' ? 'badge-success' : 'badge-warning') + '">' + (h.acao === 'entrada' ? 'Entrada' : 'Saída') + '</span></td>';
            html += '<td>' + (idx + 1) + 'º</td></tr>';
        });
        html += '</tbody></table><div class="alert alert-info">Total: ' + filtrados.length + ' registos</div>';
        document.getElementById('historicoLista').innerHTML = html;
    }

    function gerarTabelaDocumentos(lista) {
        let html = '<table class="table"><thead><th>Prestador</th><th>Seguro</th><th>Alvará</th><th>Formação</th><th>Status</th><th>Ação</th></thead><tbody>';
        lista.forEach(p => {

            html += '<td><span class="badge ' + (p.documentos.alvara === 'valido' ? 'badge-success' : p.documentos.alvara === 'invalido' ? 'badge-danger' : 'badge-warning') + '">' + p.documentos.alvara + '</span></td>';
            html += '<td><span class="badge ' + (p.documentos.formacao === 'valido' ? 'badge-success' : p.documentos.formacao === 'invalido' ? 'badge-danger' : 'badge-warning') + '">' + p.documentos.formacao + '</span></td>';

    function renderInterior() {

        }));

    // VALIDAÇÃO
    window.abrirValidacao = function(id) {
        let p = prestadores.find(p => p.id === id);
        showModal('<h3>Validar Documentos - ' + p.nome + '</h3>' +
            '<div class="form-group"><label>Seguro</label><select id="val_seguranca"><option ' + (p.documentos.seguranca === 'valido' ? 'selected' : '') + '>valido</option><option ' + (p.documentos.seguranca === 'pendente' ? 'selected' : '') + '>pendente</option><option ' + (p.documentos.seguranca === 'invalido' ? 'selected' : '') + '>invalido</option></select></div>' +
            '<div class="form-group"><label>Alvará</label><select id="val_alvara"><option ' + (p.documentos.alvara === 'valido' ? 'selected' : '') + '>valido</option><option ' + (p.documentos.alvara === 'pendente' ? 'selected' : '') + '>pendente</option><option ' + (p.documentos.alvara === 'invalido' ? 'selected' : '') + '>invalido</option></select></div>' +
            '<div class="form-group"><label>Formação</label><select id="val_formacao"><option ' + (p.documentos.formacao === 'valido' ? 'selected' : '') + '>valido</option><option ' + (p.documentos.formacao === 'pendente' ? 'selected' : '') + '>pendente</option><option ' + (p.documentos.formacao === 'invalido' ? 'selected' : '') + '>invalido</option></select></div>' +
            '<button class="btn-success" onclick="salvarValidacao(' + id + ')">Salvar</button>');
    };
    
    window.salvarValidacao = function(id) {
        let p = prestadores.find(p => p.id === id);
        p.documentos.seguranca = document.getElementById('val_seguranca').value;
        p.documentos.alvara = document.getElementById('val_alvara').value;
        p.documentos.formacao = document.getElementById('val_formacao').value;
        verificarAutorizacao(p);
        closeModal();
        renderPage('documentos');
    };
    
    window.criarPrestador = function() {
        let nif = document.getElementById('novoNif')?.value;
        let nome = document.getElementById('novoNome')?.value;
        let email = document.getElementById('novoEmail')?.value;
        let trabalhadoresStr = document.getElementById('novoTrabalhadores')?.value;
        if (!nif || !nome) {
            showToast('Preencha NIF e Nome', 'warning');
            return;
        }
        let trabalhadores = trabalhadoresStr ? trabalhadoresStr.split(',').map(t => t.trim()) : [];
        let novo = {
            id: prestadores.length + 1, nome, nif, email, status: "pendente",
            documentos: { seguranca: "pendente", alvara: "pendente", formacao: "pendente" },
            trabalhadores: trabalhadores
        };
        prestadores.push(novo);
        showToast('✅ ' + nome + ' registado!', 'success');
        renderPage('prestadores');
    };
    
    const pagesRender = {
        dashboard: renderDashboard,
        acessos: renderAcessos,
        prestadores: renderPrestadores,
        documentos: renderDocumentos,
        historico: renderHistorico,
        interior: renderInterior
    };
    
    function renderPage(page) {
        currentPage = page;
        let renderFn = pagesRender[page];
        if (renderFn) {
            document.getElementById('content-body').innerHTML = renderFn();
        }
        if (page === 'historico') setTimeout(atualizarHistoricoLista, 100);
        if (page === 'prestadores') setTimeout(filtrarPrestadoresLista, 100);
        if (page === 'documentos') setTimeout(filtrarDocumentos, 100);
        if (page === 'interior') setTimeout(filtrarInterior, 100);
        
        let titles = {
            dashboard: 'Dashboard',
            acessos: 'Controlo de Acessos',
            prestadores: 'Prestadores',
            documentos: 'Validação Documental',
            historico: 'Histórico e Filtros',
            interior: 'Pessoas no Interior'
        };
        document.getElementById('page-title').innerHTML = titles[page] || page;
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
            if (item.getAttribute('data-page') === page) item.classList.add('active');
        });
    }
    
    function atualizarPermissoes() {
        let isAdmin = currentUser === 'admin';
        let menuPrestadores = document.getElementById('menuPrestadores');
        let menuDocumentos = document.getElementById('menuDocumentos');
        if (menuPrestadores) menuPrestadores.style.display = isAdmin ? 'flex' : 'none';
        if (menuDocumentos) menuDocumentos.style.display = isAdmin ? 'flex' : 'none';
        document.getElementById('userRoleBadge').innerHTML = isAdmin ? '👑 Administrador' : '🚪 Portaria';
        if (!isAdmin && (currentPage === 'prestadores' || currentPage === 'documentos')) {
            renderPage('dashboard');
        } else {
            renderPage(currentPage);
        }
    }
    
    window.aplicarFiltrosHistorico = atualizarHistoricoLista;
    window.limparFiltrosHistorico = function() {
        document.getElementById('filtroDataInicio').value = '';
        document.getElementById('filtroDataFim').value = '';
        document.getElementById('filtroTipo').value = '';
        document.getElementById('filtroAcao').value = '';
        document.getElementById('filtroNome').value = '';
        atualizarHistoricoLista();
    };
    window.registrarSaida = registrarSaida;
    window.navigateTo = function(page) {
        if ((page === 'prestadores' || page === 'documentos') && currentUser !== 'admin') return;
        renderPage(page);
    };
    
    document.querySelectorAll('.user-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentUser = btn.getAttribute('data-user');
            atualizarPermissoes();
            showToast('Perfil: ' + (currentUser === 'admin' ? 'Administrador' : 'Portaria'), 'info');
        });
    });
    
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            let page = item.getAttribute('data-page');
            window.navigateTo(page);
        });
    });
    
    atualizarPermissoes();
</script>
</body>
</html>
