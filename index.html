<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Birkenstock S&CC Portugal | Gestão de Documentos e Acessos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body { font-family: 'DIN Next', 'Segoe UI', 'Roboto', 'Arial', sans-serif; background: #f5f5f5; color: #1a1a1a; line-height: 1.5; }

        :root {
            --birkenstock-blue: #003d7c;
            --birkenstock-dark-blue: #002a57;
            --birkenstock-green: #4a6a3b;
            --birkenstock-beige: #f4f0e6;
            --birkenstock-orange: #f4a261;
            --birkenstock-red: #c44536;
        }

        .header { background: linear-gradient(135deg, var(--birkenstock-blue), var(--birkenstock-dark-blue)); color: white; padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo-container { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .logo-placeholder { background: white; padding: 0.4rem 1rem; border-radius: 8px; font-weight: bold; font-size: 1.1rem; color: var(--birkenstock-blue); text-align: center; }
        .logo-placeholder small { font-size: 0.65rem; display: block; color: var(--birkenstock-green); }
        .logo-text h1 { font-size: 1.1rem; font-weight: 600; }
        .logo-text p { font-size: 0.7rem; opacity: 0.9; }
        .user-selector { display: flex; gap: 0.5rem; background: rgba(255,255,255,0.15); padding: 0.3rem 0.8rem; border-radius: 40px; flex-wrap: wrap; }
        .user-btn { background: transparent; border: none; color: white; padding: 0.4rem 1rem; border-radius: 30px; cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: all 0.2s; }
        .user-btn.active { background: var(--birkenstock-green); }
        .user-btn:hover { background: rgba(255,255,255,0.3); }

        .app-container { display: flex; max-width: 1400px; margin: 1.5rem auto; gap: 1.5rem; padding: 0 1.5rem; }
        .sidebar { width: 280px; min-width: 240px; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); flex-shrink: 0; height: fit-content; position: sticky; top: 85px; }
        .sidebar-header { background: var(--birkenstock-blue); color: white; padding: 1rem; font-weight: 600; border-radius: 12px 12px 0 0; }
        .sidebar-nav { padding: 0.5rem 0; }
        .nav-item { padding: 0.7rem 1.2rem; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 500; color: #2c3e50; }
        .nav-item:hover { background: var(--birkenstock-beige); border-left-color: var(--birkenstock-green); }
        .nav-item.active { background: var(--birkenstock-beige); border-left-color: var(--birkenstock-green); color: var(--birkenstock-blue); font-weight: 600; }

        .content-area { flex: 1; min-width: 0; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        .content-header { background: var(--birkenstock-beige); padding: 1rem 1.5rem; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .content-header h2 { font-size: 1.2rem; color: var(--birkenstock-blue); font-weight: 600; }
        .content-body { padding: 1.5rem; max-height: calc(100vh - 160px); overflow-y: auto; }

        .card { background: white; border-radius: 12px; padding: 1.2rem; margin-bottom: 1.2rem; border: 1px solid #e0e0e0; }
        .card-title { font-size: 1rem; font-weight: 600; color: var(--birkenstock-blue); margin-bottom: 1rem; border-bottom: 2px solid var(--birkenstock-green); padding-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.8rem; color: #555; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; font-size: 0.9rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--birkenstock-blue); }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: none; font-weight: 500; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.3rem; }
        .btn-primary { background: var(--birkenstock-blue); color: white; }
        .btn-primary:hover { background: var(--birkenstock-dark-blue); }
        .btn-success { background: var(--birkenstock-green); color: white; }
        .btn-success:hover { background: #3a5a2b; }
        .btn-warning { background: var(--birkenstock-orange); color: white; }
        .btn-danger { background: var(--birkenstock-red); color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }
        .btn-excel { background: #1f724c; color: white; }

        .table-wrapper { overflow-x: auto; margin: 1rem 0; }
        .table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 500px; }
        .table th, .table td { border: 1px solid #e0e0e0; padding: 0.6rem; text-align: left; vertical-align: top; }
        .table th { background: var(--birkenstock-beige); color: var(--birkenstock-blue); font-weight: 600; white-space: nowrap; }
        .badge { padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-block; white-space: nowrap; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-info { background: var(--birkenstock-beige); color: var(--birkenstock-blue); }
        .alert { padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.85rem; }
        .alert-info { background: var(--birkenstock-beige); border-left: 4px solid var(--birkenstock-blue); }
        .alert-warning { background: #fff3cd; border-left: 4px solid var(--birkenstock-orange); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: white; border-radius: 12px; padding: 1rem; text-align: center; border: 1px solid #e0e0e0; }
        .stat-number { font-size: 1.8rem; font-weight: 700; color: var(--birkenstock-blue); line-height: 1.2; }
        .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
        .filter-input { padding: 0.4rem 0.8rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.8rem; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 12px; padding: 1.5rem; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .toast-message { position: fixed; bottom: 20px; right: 20px; background: var(--birkenstock-blue); color: white; padding: 12px 24px; border-radius: 40px; z-index: 2000; animation: slideIn 0.3s ease; font-size: 0.85rem; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .search-box { position: relative; }
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; border-radius: 6px; max-height: 200px; overflow-y: auto; z-index: 10; display: none; }
        .search-results div { padding: 0.5rem; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.8rem; }
        .search-results div:hover { background: var(--birkenstock-beige); }
        .tooltip { border-bottom: 1px dashed #999; cursor: help; }
        @media (max-width: 768px) { html { font-size: 14px; } .app-container { flex-direction: column; } .sidebar { width: 100%; position: static; } .sidebar-nav { display: flex; flex-wrap: wrap; gap: 0.3rem; padding: 0.8rem; } .nav-item { flex: 1; border-left: none; border-bottom: 2px solid transparent; justify-content: center; } .nav-item.active { border-bottom-color: var(--birkenstock-green); } .stats-grid { grid-template-columns: repeat(2, 1fr); } .filter-group { flex-direction: column; align-items: stretch; } .filter-input, .btn { width: 100%; } }
        @media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="header">
    <div class="header-content">
        <div class="logo-container">
            <div class="logo-placeholder"><strong>BIRKENSTOCK</strong><small>S&CC Portugal</small></div>
            <div class="logo-text"><h1>Gestão de Documentos e Acessos</h1><p>Controlo de Prestadores | Validação Documental</p></div>
        </div>
        <div class="user-selector">
            <button class="user-btn active" data-user="portaria">🚪 Portaria</button>
            <button class="user-btn" data-user="admin">👑 Administrador</button>
            <button class="user-btn" data-user="visualizador">👁️ Visualizador</button>
        </div>
    </div>
</div>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">📋 MENU</div>
        <div class="sidebar-nav">
            <div class="nav-item active" data-page="dashboard">🏠 Dashboard</div>
            <div class="nav-item" data-page="acessos">🚪 Controlo Acessos</div>
            <div class="nav-item" data-page="prestadores" id="menuPrestadores">🏢 Prestadores</div>
            <div class="nav-item" data-page="colaboradores" id="menuColaboradores">👥 Colaboradores</div>
            <div class="nav-item" data-page="documentos" id="menuDocumentos">📄 Validação</div>
            <div class="nav-item" data-page="maquinas" id="menuMaquinas">🔧 Máquinas</div>
            <div class="nav-item" data-page="historico">📋 Histórico</div>
            <div class="nav-item" data-page="interior">👥 No Interior</div>
        </div>
    </aside>
    <main class="content-area">
        <div class="content-header">
            <h2 id="page-title">Dashboard</h2>
            <div id="userRoleBadge" class="badge badge-info">👤 Portaria</div>
        </div>
        <div class="content-body" id="content-body"></div>
    </main>
</div>
<div id="modal" class="modal-overlay"><div class="modal-content" id="modal-content"></div></div>

<script>
    // ==================== DOCUMENTOS ====================
    const documentosEmpresa = [
        { id: "E1", nome: "Certidão Permanente", obrigatorio: true, validadeDias: null, observacoes: "Código de acesso à Certidão Permanente (válido/ativo)" },
        { id: "E2", nome: "Situação Fiscal (AT)", obrigatorio: true, validadeDias: 90, observacoes: "Declaração emitida nos últimos 90 dias" },
        { id: "E3", nome: "Situação Contributiva (SS)", obrigatorio: true, validadeDias: 90, observacoes: "Declaração emitida nos últimos 90 dias" },
        { id: "E4", nome: "Alvará / Registo IMPIC", obrigatorio: true, validadeDias: null, observacoes: "Válido e adequado à classe da obra ou serviço" },
        { id: "E5", nome: "Seguro Responsabilidade Civil", obrigatorio: true, validadeDias: null, observacoes: "Apólice + Comprovativo de pagamento" },
        { id: "E6", nome: "Seguro Acidentes Trabalho", obrigatorio: true, validadeDias: null, observacoes: "Apólice + Recibo atual + DRI" },
        { id: "E7", nome: "Avaliação de Riscos (IPAR)", obrigatorio: true, validadeDias: null, observacoes: "Identificação de perigos específica para o local/tarefa" },
        { id: "E8", nome: "Declaração de Conhecimento", obrigatorio: true, validadeDias: null, observacoes: "Assinada pelo Representante Legal (Anexo II)" },
        { id: "E9", nome: "Folha de Remunerações (DRI)", obrigatorio: true, validadeDias: null, observacoes: "Documento de Remunerações Individuais - comprova vínculo à empresa" }
    ];
    
    const documentosColaborador = [
        { id: "C1", nome: "Número de Contribuinte", obrigatorio: true, observacoes: "Número de Identificação Fiscal (NIF) do trabalhador" },
        { id: "C2", nome: "Documento de Identificação (CC)", obrigatorio: true, observacoes: "Cartão de Cidadão ou Bilhete de Identidade válido" },
        { id: "C3", nome: "Ficha de Aptidão Médica", obrigatorio: true, observacoes: "Emitida por Médico do Trabalho, dentro da validade" },
        { id: "C4", nome: "Certificados de Formação SST", obrigatorio: true, observacoes: "Formação Geral (Lei 102/2009) e Específica (se aplicável)" },
        { id: "C5", nome: "Auto de Entrega de Equipamentos de Proteção Individual (EPI)", obrigatorio: true, observacoes: "Listagem de EPIs assinada pelo trabalhador" },
        { id: "C6", nome: "Declaração de Conhecimento de Riscos", obrigatorio: true, observacoes: "Declaração de que o trabalhador conhece os riscos da atividade" }
    ];
    
    const documentosMaquina = [
        { id: "M1", nome: "Declaração CE", obrigatorio: true, observacoes: "Certificado de Conformidade Europeia" },
        { id: "M2", nome: "Relatório de Inspeção", obrigatorio: true, observacoes: "Inspeção anual obrigatória" },
        { id: "M3", nome: "Seguro da Máquina", obrigatorio: true, observacoes: "Responsabilidade Civil específica" },
        { id: "M4", nome: "Certificado de Manobrador", obrigatorio: true, observacoes: "Formação específica para operação" }
    ];
    
    // ==================== DADOS ====================
    let currentUser = 'portaria';
    let currentPage = 'dashboard';
    let nextId = 100;
    
    let prestadores = [
        { id: 1, nome: "Manutenção Industrial Lda", nif: "513952608", email: "contato@manutencao.pt", status: "autorizado", documentos: {}, trabalhadores: ["João Silva", "Carlos Mendes", "António Ferreira"] },
        { id: 2, nome: "Transportes Expresso", nif: "509059040", email: "logistica@expresso.pt", status: "pendente", documentos: {}, trabalhadores: ["José Santos", "Paulo Rodrigues"] },
        { id: 3, nome: "Limpeza e Conservação Lda", nif: "506323781", email: "limpeza@conservacao.pt", status: "autorizado", documentos: {}, trabalhadores: ["Maria Silva", "Ana Costa", "Sofia Martins"] },
        { id: 4, nome: "Segurança Global", nif: "512345678", email: "seguranca@global.pt", status: "pendente", documentos: {}, trabalhadores: ["Rui Pereira", "Pedro Alves"] }
    ];
    
    let colaboradores = [
        { id: 1, nome: "João Silva", nifContribuinte: "123456789", empresaId: 1, empresaNome: "Manutenção Industrial Lda", status: "autorizado", documentos: {} },
        { id: 2, nome: "Carlos Mendes", nifContribuinte: "987654321", empresaId: 1, empresaNome: "Manutenção Industrial Lda", status: "autorizado", documentos: {} },
        { id: 3, nome: "Maria Silva", nifContribuinte: "456789123", empresaId: 3, empresaNome: "Limpeza e Conservação Lda", status: "autorizado", documentos: {} },
        { id: 4, nome: "José Santos", nifContribuinte: "789123456", empresaId: 2, empresaNome: "Transportes Expresso", status: "pendente", documentos: {} }
    ];
    
    let maquinas = [
        { id: 1, nome: "Empilhador E-01", matricula: "EMP-001", empresaId: 1, empresaNome: "Manutenção Industrial Lda", status: "autorizado", documentos: {}, manobradorId: 1, manobradorNome: "João Silva" }
    ];
    
    let pessoasNoInterior = [
        { id: 1, nome: "João Silva", empresaId: 1, empresaNome: "Manutenção Industrial Lda", tipo: "prestador", entrada: "08:30", data: new Date().toLocaleDateString('pt-PT'), timestamp: new Date().setHours(8,30,0) },
        { id: 2, nome: "Maria Silva", empresaId: 3, empresaNome: "Limpeza e Conservação Lda", tipo: "prestador", entrada: "09:15", data: new Date().toLocaleDateString('pt-PT'), timestamp: new Date().setHours(9,15,0) }
    ];
    
    let historicoAcessos = [
        { id: 1, nome: "João Silva", empresaNome: "Manutenção Industrial Lda", tipo: "prestador", acao: "entrada", data: new Date().toLocaleDateString('pt-PT'), hora: "08:30", timestamp: new Date().setHours(8,30,0) },
        { id: 2, nome: "Maria Silva", empresaNome: "Limpeza e Conservação Lda", tipo: "prestador", acao: "entrada", data: new Date().toLocaleDateString('pt-PT'), hora: "09:15", timestamp: new Date().setHours(9,15,0) }
    ];
    
    let currentPrestadorSelecionado = null;
    let historicoFiltradoAtual = [];
    let prestadoresFiltradosAtual = [];
    
    function inicializarDocumentos() {
        prestadores.forEach(p => {
            documentosEmpresa.forEach(doc => { if (!p.documentos[doc.id]) p.documentos[doc.id] = { estado: p.status === "autorizado" ? "valido" : "pendente", validade: "", observacao: doc.observacoes }; });
        });
        colaboradores.forEach(c => {
            documentosColaborador.forEach(doc => { if (!c.documentos[doc.id]) c.documentos[doc.id] = { estado: c.status === "autorizado" ? "valido" : "pendente", validade: "", observacao: doc.observacoes }; });
        });
        maquinas.forEach(m => {
            documentosMaquina.forEach(doc => { if (!m.documentos[doc.id]) m.documentos[doc.id] = { estado: m.status === "autorizado" ? "valido" : "pendente", validade: "", observacao: doc.observacoes }; });
        });
    }
    
    function verificarStatusPrestador(p) { let ok = documentosEmpresa.filter(d=>d.obrigatorio).every(d=>p.documentos[d.id]?.estado==="valido"); if(ok && p.status!=="autorizado"){ p.status="autorizado"; showToast(`✅ ${p.nome} AUTORIZADO!`,"success"); } else if(!ok && p.status==="autorizado"){ p.status="pendente"; showToast(`⚠️ ${p.nome} - Documentos inválidos!`,"warning"); } return p.status==="autorizado"; }
    function verificarStatusColaborador(c) { let p=prestadores.find(p=>p.id===c.empresaId); if(!p||p.status!=="autorizado") return false; let ok=documentosColaborador.filter(d=>d.obrigatorio).every(d=>c.documentos[d.id]?.estado==="valido"); if(ok && c.status!=="autorizado") c.status="autorizado"; else if(!ok && c.status==="autorizado") c.status="pendente"; return c.status==="autorizado" && p.status==="autorizado"; }
    function verificarStatusMaquina(m) { let p=prestadores.find(p=>p.id===m.empresaId); if(!p||p.status!=="autorizado") return false; let ok=documentosMaquina.filter(d=>d.obrigatorio).every(d=>m.documentos[d.id]?.estado==="valido"); if(ok && m.status!=="autorizado") m.status="autorizado"; else if(!ok && m.status==="autorizado") m.status="pendente"; if(m.manobradorId){ let man=colaboradores.find(c=>c.id===m.manobradorId); if(!man||man.status!=="autorizado") return false; } return m.status==="autorizado" && p.status==="autorizado"; }
    
    function showToast(msg,type='info'){ let t=document.createElement('div'); t.className='toast-message'; t.style.background=type==='success'?'#4a6a3b':type==='warning'?'#f4a261':'#003d7c'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    function closeModal(){ document.getElementById('modal').style.display='none'; }
    function showModal(content){ let modal=document.getElementById('modal'), mc=document.getElementById('modal-content'); mc.innerHTML=content+'<div style="margin-top:1rem; text-align:right;"><button class="btn btn-secondary" onclick="closeModal()">Fechar</button></div>'; modal.style.display='flex'; }
    function exportToExcel(data,filename,cols){ if(!data||!data.length){ showToast('Nenhum dado para exportar','warning'); return; } let rows=[cols.map(c=>`"${c}"`).join(',')]; data.forEach(r=>{ rows.push(cols.map(c=>{ let v=r[c]!==undefined&&r[c]!==null?r[c]:''; if(typeof v==='string') v=v.replace(/"/g,'""'); return `"${v}"`; }).join(',')); }); let blob=new Blob(["\uFEFF"+rows.join('\n')],{type:'text/csv;charset=utf-8;'}); let a=document.createElement('a'); let url=URL.createObjectURL(blob); a.href=url; a.download=`${filename}_${new Date().toLocaleDateString('pt-PT').replace(/\//g,'-')}.csv`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); showToast(`📊 Exportado: ${filename}`,'success'); }
    
    function registrarEntrada(tipo,prestadorId,nomePessoa,transpNome,empresaVisita,forcar=false){
        if(tipo==='prestador'){
            let p=prestadores.find(p=>p.id===prestadorId);
            if(!p) return false;
            if(p.status!=='autorizado' && !forcar){ showToast(`❌ ACESSO NEGADO! ${p.nome} - Documentação não validada.`,'warning'); return false; }
            let now=new Date(); let pessoa={id:nextId++,nome:nomePessoa,empresaId:prestadorId,empresaNome:p.nome,tipo:"prestador",entrada:now.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}),data:now.toLocaleDateString('pt-PT'),timestamp:now.getTime(),forcar:forcar};
            pessoasNoInterior.push(pessoa);
            historicoAcessos.unshift({id:nextId++,nome:nomePessoa,empresaNome:p.nome,tipo:"prestador",acao:"entrada",data:pessoa.data,hora:pessoa.entrada,timestamp:now.getTime(),observacao:forcar?'ACESSO FORÇADO':''});
            showToast((forcar?'⚠️ ACESSO FORÇADO: ':'✅ Entrada: ')+nomePessoa+' ('+p.nome+')',forcar?'warning':'success');
        } else if(tipo==='visita'){
            let now=new Date(); let pessoa={id:nextId++,nome:nomePessoa,empresaId:null,empresaNome:empresaVisita||"-",tipo:"visita",entrada:now.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}),data:now.toLocaleDateString('pt-PT'),timestamp:now.getTime()};
            pessoasNoInterior.push(pessoa); historicoAcessos.unshift({id:nextId++,nome:nomePessoa,empresaNome:empresaVisita||"-",tipo:"visita",acao:"entrada",data:pessoa.data,hora:pessoa.entrada,timestamp:now.getTime()});
            showToast(`✅ Visita: ${nomePessoa}`+(empresaVisita?` (${empresaVisita})`:''),'success');
        } else if(tipo==='transportista'){
            let now=new Date(); let pessoa={id:nextId++,nome:nomePessoa,empresaId:null,empresaNome:transpNome||"Transportadora",tipo:"transportista",entrada:now.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}),data:now.toLocaleDateString('pt-PT'),timestamp:now.getTime()};
            pessoasNoInterior.push(pessoa); historicoAcessos.unshift({id:nextId++,nome:nomePessoa,empresaNome:transpNome||"Transportadora",tipo:"transportista",acao:"entrada",data:pessoa.data,hora:pessoa.entrada,timestamp:now.getTime()});
            showToast(`✅ Transportista: ${nomePessoa}`,'success');
        }
        return true;
    }
    
    function registrarSaida(pessoaId){ let p=pessoasNoInterior.find(p=>p.id===pessoaId); if(!p) return; let now=new Date(); historicoAcessos.unshift({id:nextId++,nome:p.nome,empresaNome:p.empresaNome,tipo:p.tipo,acao:"saida",data:now.toLocaleDateString('pt-PT'),hora:now.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}),timestamp:now.getTime()}); pessoasNoInterior=pessoasNoInterior.filter(p=>p.id!==pessoaId); showToast(`🚪 Saída: ${p.nome}`,'success'); renderPage(currentPage); }
    function forcarAcesso(prestadorId,nomeTrabalhador){ let p=prestadores.find(p=>p.id===prestadorId); showModal(`<h3>⚠️ Forçar Acesso</h3><p><strong>Prestador:</strong> ${p.nome}</p><p><strong>Status:</strong> ${p.status==='autorizado'?'Autorizado':'Pendente/Negado'}</p><div class="form-group"><label>Nome do Trabalhador</label><input type="text" id="forcarNome" value="${nomeTrabalhador}"></div><div class="form-group"><label>Motivo</label><input type="text" id="forcarMotivo" placeholder="Ex: Urgência"></div><button class="btn btn-warning" onclick="confirmarForcarAcesso(${prestadorId})">⚠️ Confirmar</button>`); }
    window.confirmarForcarAcesso=function(id){ let nome=document.getElementById('forcarNome')?.value; let motivo=document.getElementById('forcarMotivo')?.value; if(!nome){ showToast('Informe o nome','warning'); return; } registrarEntrada('prestador',id,nome,'','',true); showToast(`⚠️ ACESSO FORÇADO! Motivo: ${motivo||'Não informado'}`,'warning'); closeModal(); renderPage('acessos'); };
    
    window.filterPrestadores=function(){ let s=document.getElementById('prestadorSearch')?.value?.toLowerCase()||''; let r=prestadores.filter(p=>p.nome.toLowerCase().includes(s)); let d=document.getElementById('prestadorResults'); if(s&&r.length){ d.innerHTML=r.map(p=>`<div onclick="selectPrestador(${p.id},'${p.nome.replace(/'/g,"\\'")}')">${p.nome} - ${p.status==='autorizado'?'✅ Autorizado':'⏳ Pendente'}</div>`).join(''); d.style.display='block'; } else d.style.display='none'; };
    window.selectPrestador=function(id,nome){ document.getElementById('prestadorSearch').value=nome; currentPrestadorSelecionado=prestadores.find(p=>p.id===id); let p=currentPrestadorSelecionado; let statusHtml=p.status==='autorizado'?'<span class="badge badge-success">AUTORIZADO</span>':'<span class="badge badge-danger">NEGADO/PENDENTE</span>'; document.getElementById('selectedPrestadorId').value=id; document.getElementById('selectedPrestadorInfo').innerHTML=`<strong>${p.nome}</strong><br>Status: ${statusHtml}<br>Trabalhadores: ${p.trabalhadores.join(', ')}`; document.getElementById('prestadorResults').style.display='none'; document.getElementById('trabalhadorSearch').disabled=false; document.getElementById('trabalhadorSearch').value=''; document.getElementById('selectedTrabalhador').value=''; let b=`<div style="margin-top:0.5rem;"><button class="btn-success btn-sm" onclick="confirmarEntradaPrestador()">✅ Registrar Entrada</button>`; if(p.status!=='autorizado') b+=`<button class="btn-warning btn-sm" style="margin-left:0.5rem;" onclick="forcarAcesso(${p.id}, document.getElementById('trabalhadorSearch').value)">⚠️ Forçar Acesso</button>`; b+=`</div>`; document.getElementById('selectedPrestadorInfo').innerHTML+=b; window.filterTrabalhadores(); };
    window.filterTrabalhadores=function(){ let p=currentPrestadorSelecionado; if(!p) return; let s=document.getElementById('trabalhadorSearch')?.value?.toLowerCase()||''; let r=p.trabalhadores.filter(t=>t.toLowerCase().includes(s)); let d=document.getElementById('trabalhadorResults'); if(s&&r.length){ d.innerHTML=r.map(t=>`<div onclick="selectTrabalhador('${t.replace(/'/g,"\\'")}')">${t}</div>`).join(''); d.style.display='block'; } else d.style.display='none'; };

    window.confirmarEntradaPrestador=function(){ let pid=document.getElementById('selectedPrestadorId').value; let trab=document.getElementById('selectedTrabalhador').value; if(!pid||!trab){ showToast('Selecione prestador e trabalhador','warning'); return; } registrarEntrada('prestador',parseInt(pid),trab,'','',false); renderPage('acessos'); };

    function renderDashboard(){ let hoje=new Date().toLocaleDateString('pt-PT'); let entradasHoje=historicoAcessos.filter(h=>h.acao==='entrada'&&h.data===hoje).length; let prestAutorizados=prestadores.filter(p=>p.status==='autorizado').length; let prestPendentes=prestadores.length-prestAutorizados; let colabAutorizados=colaboradores.filter(c=>c.status==='autorizado').length; let colabPendentes=colaboradores.length-colabAutorizados; return `<div class="stats-grid"><div class="stat-card"><div class="stat-number">${prestadores.length}</div><div>Prestadores</div></div><div class="stat-card"><div class="stat-number">${prestAutorizados}</div><div>Autorizados</div><small style="color:#dc3545;">${prestPendentes} pendentes</small></div><div class="stat-card"><div class="stat-number">${colaboradores.length}</div><div>Colaboradores</div><small style="color:#dc3545;">${colabPendentes} pendentes</small></div><div class="stat-card"><div class="stat-number">${pessoasNoInterior.length}</div><div>No Interior</div></div><div class="stat-card"><div class="stat-number">${entradasHoje}</div><div>Entradas Hoje</div></div></div><div class="alert alert-info"><strong>📌 Regras de Bloqueio:</strong> Se a EMPRESA estiver com documentação inválida, TODOS os seus colaboradores e máquinas ficam impedidos de aceder.</div><div class="card"><div class="card-title">👥 Pessoas no Interior</div>${pessoasNoInterior.length===0?'<div class="alert alert-info">Nenhuma pessoa</div>':'<div class="table-wrapper"><table class="table"><thead><th>Nome</th><th>Empresa</th><th>Tipo</th><th>Entrada</th></thead><tbody>'+pessoasNoInterior.map(p=>`<tr><td>${p.nome}</td><td>${p.empresaNome}</td><td><span class="badge ${p.tipo==='prestador'?'badge-success':p.tipo==='visita'?'badge-info':'badge-warning'}">${p.tipo==='prestador'?'Prestador':p.tipo==='visita'?'Visita':'Transportista'}</span></td><td>${p.entrada}</td></tr>`).join('')+'</tbody></table></div>'}</div><div class="card"><div class="card-title">📋 Últimos Acessos</div><div class="table-wrapper"><table class="table"><thead><th>Data/Hora</th><th>Nome</th><th>Empresa</th><th>Ação</th></thead><tbody>'+historicoAcessos.slice(0,5).map(h=>`<tr><td>${h.data} ${h.hora}</td><td>${h.nome}</td><td>${h.empresaNome}</td><td><span class="badge ${h.acao==='entrada'?'badge-success':'badge-warning'}">${h.acao}</span></td></tr>`).join('')+'</tbody></table></div></div>`; }
    
    function renderAcessos(){ let isVisualizador=currentUser==='visualizador'; let interiorHtml=`<div class="table-wrapper"><table class="table"><thead><th>Nome</th><th>Empresa</th><th>Tipo</th><th>Entrada</th>${isVisualizador?'':'<th>Ação</th>'}</thead><tbody>${pessoasNoInterior.map(p=>`<tr><td>${p.nome}</td><td>${p.empresaNome}</td><td><span class="badge ${p.tipo==='prestador'?'badge-success':p.tipo==='visita'?'badge-info':'badge-warning'}">${p.tipo==='prestador'?'Prestador':p.tipo==='visita'?'Visita':'Transportista'}</span></td><td>${p.entrada}</td>${isVisualizador?'':`<td><button class="btn-warning btn-sm" onclick="registrarSaida(${p.id})">Saída</button></td>`}</tr>`).join('')}</tbody></table></div>`; return `<div class="card"><div class="card-title">🚪 Registar Acesso</div><div class="form-group"><label>Tipo de Acesso *</label><select id="acessoTipo" onchange="toggleAcessoFields()" ${isVisualizador?'disabled':''}><option value="prestador">Prestador de Serviço</option><option value="visita">Visita</option><option value="transportista">Transportista</option></select></div><div id="prestadorSection"><div class="form-group"><label>Prestador de Serviço *</label><div class="search-box"><input type="text" id="prestadorSearch" placeholder="🔍 Pesquisar prestador..." onkeyup="filterPrestadores()" autocomplete="off" ${isVisualizador?'disabled':''}><div id="prestadorResults" class="search-results"></div></div><input type="hidden" id="selectedPrestadorId"><div id="selectedPrestadorInfo" class="alert alert-info" style="margin-top:0.5rem; padding:0.5rem;"></div></div><div class="form-group"><label>Trabalhador *</label><div class="search-box"><input type="text" id="trabalhadorSearch" placeholder="🔍 Pesquisar trabalhador..." onkeyup="filterTrabalhadores()" autocomplete="off" disabled><div id="trabalhadorResults" class="search-results"></div></div><input type="hidden" id="selectedTrabalhador"></div></div><div id="visitaSection" style="display:none;"><div class="form-group"><label     function gerarTabelaDocumentos(lista){ let isVis=currentUser==='visualizador'; let html=`<div class="table-wrapper"><table class="table"><thead><th>Prestador</th>`; documentosEmpresa.forEach(d=>{ html+=`<th><span class="tooltip" title="${d.observacoes}">${d.nome.substring(0,18)}...<br><span class="badge badge-danger">Obrig.</span></span></th>`; }); html+=`<th>Status</th>${isVis?'':'<th>Ações</th>'}</thead><tbody>`; lista.forEach(p=>{ let todosValidos=documentosEmpresa.filter(d=>d.obrigatorio).every(d=>p.documentos[d.id]?.estado==='valido'); html+=`<tr><td><strong>${p.nome}</strong></td>`; documentosEmpresa.forEach(d=>{ let estado=p.documentos[d.id]?.estado||'pendente'; let cls=estado==='valido'?'badge-success':estado==='invalido'?'badge-danger':'badge-warning'; let txt=estado==='valido'?'✅ Válido':estado==='invalido'?'❌ Inválido':'⏳ Pendente'; html+=`<td style="text-align:center;"><span class="badge ${cls}">${txt}</span></td>`; }); html+=`<td><span class="badge ${todosValidos?'badge-success':'badge-warning'}">${todosValidos?'Autorizado':'Pendente'}</span></td>${isVis?'':`<td><button class="btn-primary btn-sm" onclick="abrirValidacaoPrestador(${p.id})">Validar</button></td>`}</tr>`; }); html+=`</tbody></table></div>`; return html; }

    function atualizarHistoricoLista(){ let inicio=document.getElementById('filtroDataInicio')?.value; let fim=document.getElementById('filtroDataFim')?.value; let tipo=document.getElementById('filtroTipo')?.value; let nome=document.getElementById('filtroNome')?.value?.toLowerCase(); let f=[...historicoAcessos].sort((a,b)=>b.timestamp-a.timestamp); if(inicio) f=f.filter(h=>h.data>=inicio); if(fim) f=f.filter(h=>h.data<=fim); if(tipo) f=f.filter(h=>h.tipo===tipo); if(nome) f=f.filter(h=>h.nome.toLowerCase().includes(nome)||h.empresaNome.toLowerCase().includes(nome)); historicoFiltradoAtual=f; document.getElementById('historicoLista').innerHTML=`<div class="table-wrapper"><table class="table"><thead><th>Data</th><th>Hora</th><th>Nome</th><th>Empresa</th><th>Tipo</th><th>Ação</th><th>Observação</th></thead><tbody>${f.map(h=>`<tr><td>${h.data}</td><td>${h.hora}</td><td>${h.nome}</td><td>${h.empresaNome}</td><td><span class="badge ${h.tipo==='prestador'?'badge-success':'badge-info'}">${h.tipo}</span></td><td><span class="badge ${h.acao==='entrada'?'badge-success':'badge-warning'}">${h.acao}</span></td><td>${h.observacao||'-'}</td></tr>`).join('')}</tbody></table></div><div class="alert alert-info">Total: ${f.length} registos</div>`; }
    
    function renderInterior(){ let isVis=currentUser==='visualizador'; return `<div class="card"><div class="card-title">👥 Pessoas no Interior<button class="btn-excel btn-sm" onclick="exportToExcel(pessoasNoInterior,'Pessoas_No_Interior',['nome','empresaNome','tipo','entrada','data'])">📊 Excel</button></div><div class="form-group"><input type="text" id="filtroInterior" placeholder="🔍 Filtrar..." class="filter-input" style="width:100%;" onkeyup="filtrarInterior()"></div><div id="interiorLista"></div></div>`; }
    window.filtrarInterior=function(){ let s=document.getElementById('filtroInterior')?.value?.toLowerCase()||''; let f=pessoasNoInterior.filter(p=>p.nome.toLowerCase().includes(s)||p.empresaNome.toLowerCase().includes(s)); let isVis=currentUser==='visualizador'; document.getElementById('interiorLista').innerHTML=`<div class="table-wrapper"><table class="table"><thead><th>Nome</th><th>Empresa</th><th>Tipo</th><th>Entrada</th>${isVis?'':'<th>Ação</th>'}</thead><tbody>${f.map(p=>`<tr><td>${p.nome}</td><td>${p.empresaNome}</td><td><span class="badge ${p.tipo==='prestador'?'badge-success':p.tipo==='visita'?'badge-info':'badge-warning'}">${p.tipo==='prestador'?'Prestador':p.tipo==='visita'?'Visita':'Transportista'}</span></td><td>${p.entrada}</td>${isVis?'':`<td><button class="btn-warning btn-sm" onclick="registrarSaida(${p.id})">Saída</button></td>`}</tr>`).join('')}</tbody></table></div><div class="alert alert-info">Total: ${f.length} pessoas</div>`; };
    
    // Funções de validação
    window.abrirValidacaoPrestador=function(id){ let p=prestadores.find(p=>p.id===id); let html=`<h3>Validar Documentos - ${p.nome}</h3><div style="max-height:500px; overflow-y:auto;">`; documentosEmpresa.forEach(doc=>{ let estado=p.documentos[doc.id]?.estado||'pendente'; html+=`<div class="card" style="margin-bottom:0.8rem;"><strong>${doc.id} - ${doc.nome}</strong><div class="form-group"><label>Estado</label><select id="doc_${doc.id}"><option ${estado==='valido'?'selected':''}>valido</option><option ${estado==='pendente'?'selected':''}>pendente</option><option ${estado==='invalido'?'selected':''}>invalido</option></select></div><div class="form-group"><label>Observações</label><textarea readonly style="background:#f5f5f5;">${doc.observacoes}</textarea></div></div>`; }); html+=`</div><button class="btn btn-success" onclick="salvarValidacaoPrestador(${id})">Salvar</button>`; showModal(html); };
    window.salvarValidacaoPrestador=function(id){ let p=prestadores.find(p=>p.id===id); documentosEmpresa.forEach(doc=>{ let estado=document.getElementById(`doc_${doc.id}`)?.value; if(estado) p.documentos[doc.id]={...p.documentos[doc.id], estado:estado}; }); verificarStatusPrestador(p); colaboradores.filter(c=>c.empresaId===id).forEach(c=>verificarStatusColaborador(c)); maquinas.filter(m=>m.empresaId===id).forEach(m=>verificarStatusMaquina(m)); closeModal(); renderPage('prestadores'); };
    window.abrirValidacaoColaborador=function(id){ let c=colaboradores.find(c=>c.id===id); let html=`<h3>Validar Documentos - ${c.nome}</h3><div style="max-height:500px; overflow-y:auto;">`; documentosColaborador.forEach(doc=>{ let estado=c.documentos[doc.id]?.estado||'pendente'; html+=`<div class="card"><strong>${doc.id} - ${doc.nome}</strong><div class="form-group"><label>Estado</label><select id="doc_${doc.id}"><option ${estado==='valido'?'selected':''}>valido</option><option ${estado==='pendente'?'selected':''}>pendente</option><option ${estado==='invalido'?'selected':''}>invalido</option></select></div><div class="form-group"><label>Observações</label><textarea readonly>${doc.observacoes}</textarea></div></div>`; }); html+=`</div><button class="btn btn-success" onclick="salvarValidacaoColaborador(${id})">Salvar</button>`; showModal(html); };
    window.salvarValidacaoColaborador=function(id){ let c=colaboradores.find(c=>c.id===id); documentosColaborador.forEach(doc=>{ let estado=document.getElementById(`doc_${doc.id}`)?.value; if(estado) c.documentos[doc.id]={...c.documentos[doc.id], estado:estado}; }); verificarStatusColaborador(c); closeModal(); renderPage('colaboradores'); };
    window.abrirValidacaoMaquina=function(id){ let m=maquinas.find(m=>m.id===id); let html=`<h3>Validar Documentos - ${m.nome}</h3><div style="max-height:500px; overflow-y:auto;">`; documentosMaquina.forEach(doc=>{ let estado=m.documentos[doc.id]?.estado||'pendente'; html+=`<div class="card"><strong>${doc.id} - ${doc.nome}</strong><div class="form-group"><label>Estado</label><select id="doc_${doc.id}"><option ${estado==='valido'?'selected':''}>valido</option><option ${estado==='pendente'?'selected':''}>pendente</option><option ${estado==='invalido'?'selected':''}>invalido</option></select></div><div class="form-group"><label>Observações</label><textarea readonly>${doc.observacoes}</textarea></div></div>`; }); html+=`</div><button class="btn btn-success" onclick="salvarValidacaoMaquina(${id})">Salvar</button>`; showModal(html); };
    window.salvarValidacaoMaquina=function(id){ let m=maquinas.find(m=>m.id===id); documentosMaquina.forEach(doc=>{ let estado=document.getElementById(`doc_${doc.id}`)?.value; if(estado) m.documentos[doc.id]={...m.documentos[doc.id], estado:estado}; }); verificarStatusMaquina(m); closeModal(); renderPage('maquinas'); };
    
    window.criarPrestador=function(){ let nif=document.getElementById('novoNif')?.value; let nome=document.getElementById('novoNome')?.value; let email=document.getElementById('novoEmail')?.value; let trabStr=document.getElementById('novoTrabalhadores')?.value; if(!nif||!nome){ showToast('Preencha NIF e Nome','warning'); return; } let trabalhadores=trabStr?trabStr.split(',').map(t=>t.trim()):[]; let novo={id:prestadores.length+1, nome, nif, email, status:"pendente", documentos:{}, trabalhadores}; documentosEmpresa.forEach(doc=>{ novo.documentos[doc.id]={estado:"pendente", validade:"", observacao:doc.observacoes}; }); prestadores.push(novo); showToast(`✅ Prestador "${nome}" registado!`,'success'); renderPage('prestadores'); };
    window.criarColaborador=function(){ let nome=document.getElementById('novoColabNome')?.value; let nif=document.getElementById('novoColabNif')?.value; let pid=parseInt(document.getElementById('novoColabPrestador')?.value); if(!nome||!nif){ showToast('Preencha Nome e Nº Contribuinte','warning'); return; } let p=prestadores.find(p=>p.id===pid); let novo={id:colaboradores.length+1, nome, nifContribuinte:nif, empresaId:pid, empresaNome:p?.nome||'', status:"pendente", documentos:{}}; documentosColaborador.forEach(doc=>{ novo.documentos[doc.id]={estado:"pendente", validade:"", observacao:doc.observacoes}; }); colaboradores.push(novo); showToast(`✅ Colaborador "${nome}" registado!`,'success'); renderPage('colaboradores'); };
    window.criarMaquina=function(){ let nome=document.getElementById('novaMaquinaNome')?.value; let mat=document.getElementById('novaMaquinaMatricula')?.value; let pid=parseInt(document.getElementById('novaMaquinaPrestador')?.value); let mid=parseInt(document.getElementById('novaMaquinaManobrador')?.value); if(!nome||!mat){ showToast('Preencha Nome e Matrícula','warning'); return; } let p=prestadores.find(p=>p.id===pid); let man=colaboradores.find(c=>c.id===mid); let nova={id:maquinas.length+1, nome, matricula:mat, empresaId:pid, empresaNome:p?.nome||'', status:"pendente", documentos:{}, manobradorId:mid||null, manobradorNome:man?.nome||''}; documentosMaquina.forEach(doc=>{ nova.documentos[doc.id]={estado:"pendente", validade:"", observacao:doc.observacoes}; }); maquinas.push(nova); showToast(`✅ Máquina "${nome}" registada!`,'success'); renderPage('maquinas'); };
    
    window.aplicarFiltros=atualizarHistoricoLista;
    window.limparFiltros=function(){ document.getElementById('filtroDataInicio').value=''; document.getElementById('filtroDataFim').value=''; document.getElementById('filtroTipo').value=''; document.getElementById('filtroNome').value=''; atualizarHistoricoLista(); };
    window.registrarSaida=registrarSaida;
    
    const pagesRender={dashboard:renderDashboard, acessos:renderAcessos, prestadores:renderPrestadores, colaboradores:renderColaboradores, documentos:renderDocumentos, maquinas:renderMaquinas, historico:renderHistorico, interior:renderInterior};
    function renderPage(page){ currentPage=page; let fn=pagesRender[page]; if(fn) document.getElementById('content-body').innerHTML=fn(); if(page==='historico') setTimeout(atualizarHistoricoLista,100); if(page==='prestadores') setTimeout(window.filtrarPrestadoresLista,100); if(page==='colaboradores') setTimeout(window.filtrarColaboradoresLista,100); if(page==='maquinas') setTimeout(window.filtrarMaquinas,100); if(page==='documentos') setTimeout(window.filtrarDocumentos,100); if(page==='interior') setTimeout(window.filtrarInterior,100); let titles={dashboard:'Dashboard',acessos:'Controlo Acessos',prestadores:'Prestadores',colaboradores:'Colaboradores',documentos:'Validação Documental',maquinas:'Máquinas',historico:'Histórico',interior:'Pessoas no Interior'}; document.getElementById('page-title').innerHTML=titles[page]; document.querySelectorAll('.nav-item').forEach(i=>{ i.classList.remove('active'); if(i.getAttribute('data-page')===page) i.classList.add('active'); }); }
    function atualizarPermissoes(){ let isAdmin=currentUser==='admin'; let podeEditar=isAdmin; document.getElementById('menuPrestadores').style.display=podeEditar?'flex':'none'; document.getElementById('menuColaboradores').style.display=podeEditar?'flex':'none'; document.getElementById('menuDocumentos').style.display=podeEditar?'flex':'none'; document.getElementById('menuMaquinas').style.display=podeEditar?'flex':'none'; let roleText=isAdmin?'👑 Administrador':(currentUser==='visualizador'?'👁️ Visualizador':'🚪 Portaria'); document.getElementById('userRoleBadge').innerHTML=roleText; if(!isAdmin && (currentPage==='prestadores'||currentPage==='colaboradores'||currentPage==='documentos'||currentPage==='maquinas')) renderPage('dashboard'); else renderPage(currentPage); }
    document.querySelectorAll('.user-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ document.querySelectorAll('.user-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentUser=btn.getAttribute('data-user'); atualizarPermissoes(); showToast(`Perfil: ${currentUser==='admin'?'Administrador':currentUser==='visualizador'?'Visualizador':'Portaria'}`,'info'); }); });
    document.querySelectorAll('.nav-item').forEach(item=>{ item.addEventListener('click',()=>{ let page=item.getAttribute('data-page'); if((page==='prestadores'||page==='colaboradores'||page==='documentos'||page==='maquinas') && currentUser!=='admin') return; renderPage(page); }); });
    inicializarDocumentos();
    atualizarPermissoes();
</script>
</body>
</html>
